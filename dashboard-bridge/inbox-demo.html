<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard Inbox Demo</title><style>body{margin:0;background:#08080c;color:#fff;font-family:system-ui;padding:30px}.card{max-width:900px;margin:auto;background:#17171e;border:1px solid #333;border-radius:22px;padding:24px}button,input{font:inherit}.packet{padding:16px;border:1px solid #333;border-radius:14px;margin-top:12px}.muted{color:#aaa}.btn{padding:11px 14px;border:0;border-radius:12px;font-weight:800}</style></head><body><div class="card"><h1>Dashboard Production Inbox</h1><p class="muted">Proof-of-concept receiver for Studio 3.1 handoff packets.</p><input id="file" type="file" accept=".json"><div id="inbox"></div></div><script src="dashboard-bridge.js"></script><script>const box=document.getElementById('inbox');function render(){let x=ThroupleTeaProductionBridge.getInbox();box.innerHTML=x.length?x.map(p=>`<div class="packet"><b>Episode ${p.episode.number}: ${p.episode.title}</b><p class="muted">${p.production.durationFormatted} · ${p.production.markers.length} markers · ${p.dashboardSeed.tasks.length} generated tasks</p><small>${p.status}</small></div>`).join(''):'<p class="muted">No episode packets yet.</p>'}document.getElementById('file').onchange=e=>ThroupleTeaProductionBridge.importFile(e.target.files[0]).then(render).catch(err=>alert(err.message));window.addEventListener(ThroupleTeaProductionBridge.eventName,render);render();</script></body></html>
