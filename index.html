<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#08080c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Podcast Brain 3.0.1 — Recording Update</title>
  <link rel="stylesheet" href="podcast-brain.css?v=3.0.1">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/podcast-artwork.jpg" alt="A Little Throuple Tea">
        <div><strong>Podcast Brain</strong><span>A Little Throuple Tea · v3.0</span></div>
      </div>
      <nav class="nav" id="desktopNav"></nav>
      <div class="sidebar-foot">OBS records. Premiere edits.<br><b>Podcast Brain remembers.</b></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="eyebrow">William · Daniel · Caleb</div>
          <h1 id="pageTitle">Podcast Brain</h1>
        </div>
        <div class="top-actions">
          <button class="btn" id="exportBtn">Export Episode</button>
          <button class="btn danger" id="resetBtn">Reset</button>
        </div>
      </header>

      <section id="home" class="section active"></section>
      <section id="prepare" class="section"></section>
      <section id="record" class="section"></section>
      <section id="wrap" class="section"></section>
      <section id="edit" class="section"></section>
      <section id="publish" class="section"></section>
      <section id="vault" class="section"></section>
    </main>
  </div>

  <nav class="mobile-nav" id="mobileNav"></nav>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="podcast-brain.js?v=3.0.1"></script>
</body>
</html>
